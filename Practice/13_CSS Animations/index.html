<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>CSS animations</title>
</head>
<body>
    <!-- CSS animations can be used to enhance a variety of visual effects, including: -->

    <!-- Opacity: Fade elements in and out.
    Positioning: Slide elements across the screen.
    Size: Make elements grow or shrink on hover.
    Color: Change background or text colors smoothly.
    Rotation: Spin elements like icons or buttons. -->

    <!-- ************************************fadeIn************************************ -->
    <div class="fade-in">Hello, CSS Animations!</div><br />

    <!-- ************************************slideIn************************************ -->
    <div class="slide-in">Slide In Effect!</div><br />

    <!-- ************************************bounce************************************ -->
     <div class="bounce"></div><br />

    <!-- ************************************changeColor************************************ -->
     <div class="color-change">Hover Over Me!</div>
</body>
</html>
