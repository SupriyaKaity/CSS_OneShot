<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Basic Styte</title>
        <link rel="stylesheet" href="style.css">

        <style>
            h1 {
                font-style: italic;
                font-size: 36px;
                background-color: lightblue;
                color: darkblue;
                text-align: center;
            }

            p {
                font-style: normal;
                font-size: 18px;
                background-color: lightgray;
                color: black;
                text-align: left;
            }
        </style>
    </head>
    <body>
        <div>
            <h1>Welcome to My Website</h1>
            <p style="color: blue;">This is a simple webpage to demonstrate basic styling with
                CSS.</p>
        </div>
    </body>
</html>

<!-- We can write CSS styles in three different types of ways:---------------------------------------------

1. External CSS: This is the most common way to apply styles to a webpage. We create a separate CSS file (e.g., style.css) and link it to our HTML file using the <link> tag in the <head> section.

2. Internal CSS: We can also write CSS styles directly within the <style> tag in the <head> section of our HTML file. This is useful for small projects or when we want to apply styles to a single page.

3. Inline CSS: We can apply styles directly to an HTML element using the style attribute. This is not recommended for large projects as it can make the HTML code messy and harder to maintain.

and the priority of CSS styles is as follows:---------------------------------------------

1. Inline CSS (highest priority)
2. Internal CSS 
3. External CSS (lowest priority) -->
