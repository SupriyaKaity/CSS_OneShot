<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <title>CSS Transformation</title>
    </head>
    <body>
        <!-- ****************************************1. Move It! 🏃‍♂️ – translate(x, y)**************************************** -->
        <!-- <div style="background: red; display:inline-block">Normal Position</div> -->
        <div class="move-right"
            style="background: blue; display: inline-block;">Moved 50px
            Right</div><br /><br />

        <!-- ****************************************2. Grow and Shrink – scale(x, y)**************************************** -->
        <div class="zoom" style="background: red; display: inline-block;">Zoom
            1.5 times bigger</div><br /><br />

        <!-- ****************************************3. Spin Around 🔄 – rotate(angle)**************************************** -->
        <div class="rotate"
            style="background: green; display: inline-block;">Spins the element
            by 45 degrees</div><br /><br />

        <!-- ****************************************4. Tilt It – skew(x, y)**************************************** -->
        <div class="slant"
            style="background: rgb(255, 226, 9); display: inline-block;">Tilting
            a picture on the wall</div><br /><br />

        <!-- ****************************************5. The Transformation Origin 🎯 – transform-origin**************************************** -->
        <div class="rotate-from-corner"
            style="background: rgb(9, 255, 239); display: inline-block;">A door
            swinging open</div><br /><br />

        <!-- ****************************************Mix It Up! (Combining Transformations)**************************************** -->
        <div class="combo"
            style="background: rgb(255, 9, 251); display: inline-block;">Perfect
            for creating buttons that feel interactive</div><br /><br />
    </body>
</html>
