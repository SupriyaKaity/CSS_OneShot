<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Box Model</title>
</head>
<body>
    <h1><u>Box Model</u></h1>
    <h2>Margin ==> Border ==> Padding ==> Content</h2>
    
    <!-- **********************************Create an inner <div> element inside an outer <div>**************************************** -->
    <div class="outer-box">
        <div class="inner-box">
            Hello, this is the inner box!
        </div>
    </div>
    
    <!-- ***************************************This box has top margin and top padding.********************************************** -->
     <div class="box">
        This box has top margin and top padding.
     </div>

     
</body>
</html>
