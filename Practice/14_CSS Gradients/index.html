<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>CSS Gradients</title>
</head>
<body>
    <!-- A CSS Gradient is a way to create a smooth transition between two or more colors. -->

    <!-- Linear Gradient: Colors change in a straight line

    Radial Gradient: Colors spread from a center point

    Conic Gradient: Colors rotate around a center (circular angle) -->

    <!-- *****************************Linear Gradient*****************************  -->
    <div class="linear-box">Linear Gradient</div><br />

    <!-- *****************************Radial Gradient***************************** -->
     <div class="radial-box">Radial Gradient</div><br />

     <!-- *****************************Conic Gradient***************************** -->
      <div class="conic-box">Conic Gradient</div>
</body>
</html>
